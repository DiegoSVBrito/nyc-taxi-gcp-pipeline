# Copy this to ~/.dbt/profiles.yml (or keep it in dbt/ as profiles.yml — setup.sh
# generates it from this file automatically).
# The real profiles.yml is gitignored so credentials never get committed.

nyc_yellow_taxi:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: massive-network-500412-u2
      dataset: nyc_taxi
      location: US
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 600
      job_retries: 1
