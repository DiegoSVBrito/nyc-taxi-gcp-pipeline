# Copy this to ~/.dbt/profiles.yml and fill in your project.
# The real profiles.yml is gitignored so credentials never get committed.

nyc_yellow_taxi:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: your-project-id
      dataset: nyc_taxi
      location: US
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 600
      job_retries: 1
