version: 2

models:
  - name: stg_yellow_taxi
    description: >
      Cleaned, typed Yellow Taxi trips. One row per valid trip. Trips that
      cannot represent a real billable ride are filtered out.
    columns:
      - name: pickup_date
        description: Date of pickup, used as the partition key.
        tests:
          - not_null
      - name: pickup_at
        tests:
          - not_null
      - name: trip_duration_min
        description: Trip duration in minutes, between 1 and 720 by construction.
        tests:
          - not_null
      - name: payment_type
        description: TLC payment type code.
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
              quote: false
      - name: fare_amount
        tests:
          - not_null
