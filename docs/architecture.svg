<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>NYC Taxi GCP medallion architecture</title>
<desc>Flow from GCS to BigQuery with bronze, silver, and gold layers, orchestrated by Cloud Scheduler and Cloud Run.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t{font-family:sans-serif;font-size:14px;fill:#2c2c2a}
.th{font-family:sans-serif;font-size:14px;font-weight:500;fill:#2c2c2a}
.ts{font-family:sans-serif;font-size:12px;fill:#5f5e5a}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
</style>

<text class="th" x="40" y="30">Orchestration: Cloud Scheduler (daily cron) to Cloud Run Job</text>

<rect x="40" y="50" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="115" y="76" text-anchor="middle">TLC source</text>
<text class="ts" x="115" y="94" text-anchor="middle">Monthly Parquet</text>

<rect x="250" y="50" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="330" y="76" text-anchor="middle">GCS bucket</text>
<text class="ts" x="330" y="94" text-anchor="middle">Landing per month</text>

<rect x="470" y="50" width="170" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="555" y="76" text-anchor="middle">BQ load job</text>
<text class="ts" x="555" y="94" text-anchor="middle">Free, no slots</text>

<line x1="190" y1="78" x2="248" y2="78" class="arr" marker-end="url(#arrow)"/>
<line x1="410" y1="78" x2="468" y2="78" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="160" width="600" height="90" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="64" y="188">Bronze: raw native table</text>
<text class="ts" x="64" y="210">Partitioned by pickup date, schema 1:1 with the TLC source</text>
<text class="ts" x="64" y="230">No transformation, faithful raw copy</text>

<line x1="555" y1="106" x2="555" y2="158" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="290" width="600" height="100" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="64" y="318">Silver: cleaned and enriched (incremental)</text>
<text class="ts" x="64" y="340">dbt incremental by partition, filters outliers, derives earnings metrics</text>
<text class="ts" x="64" y="360">Zone joins, dollars per mile and minute, tip percent, airport flags</text>
<text class="ts" x="64" y="380">Partitioned by pickup date, clustered by pickup zone</text>

<line x1="340" y1="250" x2="340" y2="288" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="430" width="600" height="100" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="64" y="458">Gold: aggregates for the earnings question</text>
<text class="ts" x="64" y="480">earnings_by_zone_hour, tipping_by_payment, airport_runs, trip_efficiency</text>
<text class="ts" x="64" y="500">Small pre-aggregated tables, driver queries cost near zero</text>
<text class="ts" x="64" y="520">Materialized by dbt, consumed by BI or ad-hoc SQL</text>

<line x1="340" y1="390" x2="340" y2="428" class="arr" marker-end="url(#arrow)"/>
</svg>
